<style>
  .form-group { margin-bottom: 15px; }
  label { display: block; margin-bottom: 5px; font-weight: bold; }
  input { width: 100%; padding: 8px; box-sizing: border-box; }
  .button { background-color: #000; color: #fff; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; }
</style>

<div class="form-group">
  <label for="username">Elekeeper Gebruikersnaam / Email</label>
  <input type="text" id="username" placeholder="jouw@email.com" />
</div>
<div class="form-group">
  <label for="password">Elekeeper Wachtwoord</label>
  <input type="password" id="password" placeholder="Wachtwoord" />
</div>
<div class="button" onclick="login()">Inloggen & Apparaat Toevoegen</div>

<script>
  function login() {
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;
    
    // Stuur de inloggegevens naar Homey (driver.js)
    Homey.emit('login', { username: username, password: password }, function(err, device) {
      if (err) return Homey.alert('Fout bij inloggen: ' + err);
      
      // Als inloggen lukt, maak het apparaat aan en sluit het scherm
      Homey.createDevice(device, function(err) {
        if (err) return Homey.alert('Apparaat toevoegen mislukt: ' + err);
        Homey.done();
      });
    });
  }
</script>
